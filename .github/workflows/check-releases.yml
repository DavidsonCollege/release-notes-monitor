name: Check Release Notes

on:
  # Run every 4 hours
  schedule:
    - cron: '0 */4 * * *'

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      test_notification:
        description: 'Send a test notification to verify channels'
        required: false
        type: boolean
        default: false

  # Also run when config changes
  push:
    paths:
      - 'config/teams.json'

# Permissions needed to commit generated feeds and deploy Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  check-releases:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Slack channels for dashboard
        continue-on-error: true
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python scripts/fetch_slack_channels.py

      - name: Fetch Zoom channels for dashboard
        continue-on-error: true
        env:
          ZOOM_ACCOUNT_ID: ${{ secrets.ZOOM_ACCOUNT_ID }}
          ZOOM_CLIENT_ID: ${{ secrets.ZOOM_CLIENT_ID }}
          ZOOM_CLIENT_SECRET: ${{ secrets.ZOOM_CLIENT_SECRET }}
        run: python scripts/fetch_zoom_channels.py

      - name: Send test notification
        if: github.event.inputs.test_notification == 'true'
        env:
          BASE_URL: ${{ vars.BASE_URL || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_DEFAULT_CHANNEL: ${{ vars.SLACK_DEFAULT_CHANNEL }}
          ZOOM_ACCOUNT_ID: ${{ secrets.ZOOM_ACCOUNT_ID }}
          ZOOM_CLIENT_ID: ${{ secrets.ZOOM_CLIENT_ID }}
          ZOOM_CLIENT_SECRET: ${{ secrets.ZOOM_CLIENT_SECRET }}
          ZOOM_BOT_JID: ${{ secrets.ZOOM_BOT_JID }}
          ZOOM_CHATBOT_CLIENT_ID: ${{ secrets.ZOOM_CHATBOT_CLIENT_ID }}
          ZOOM_CHATBOT_CLIENT_SECRET: ${{ secrets.ZOOM_CHATBOT_CLIENT_SECRET }}
                    ZOOM_USER_EMAIL: ${{ secrets.ZOOM_USER_EMAIL }}
        run: python scripts/test_notify.py

      - name: Run release notes checker
        if: github.event.inputs.test_notification != 'true'
        env:
          BASE_URL: ${{ vars.BASE_URL || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}
          ADASTRA_EMAIL: ${{ secrets.ADASTRA_EMAIL }}
          ADASTRA_PASSWORD: ${{ secrets.ADASTRA_PASSWORD }}
          KUALI_ZD_EMAIL: ${{ secrets.KUALI_ZD_EMAIL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_DEFAULT_CHANNEL: ${{ vars.SLACK_DEFAULT_CHANNEL }}
          KUALI_ZD_PASSWORD: ${{ secrets.KUALI_ZD_PASSWORD }}
          ZOOM_ACCOUNT_ID: ${{ secrets.ZOOM_ACCOUNT_ID }}
          ZOOM_CLIENT_ID: ${{ secrets.ZOOM_CLIENT_ID }}
          ZOOM_CLIENT_SECRET: ${{ secrets.ZOOM_CLIENT_SECRET }}
          ZOOM_BOT_JID: ${{ secrets.ZOOM_BOT_JID }}
          ZOOM_CHATBOT_CLIENT_ID: ${{ secrets.ZOOM_CHATBOT_CLIENT_ID }}
          ZOOM_CHATBOT_CLIENT_SECRET: ${{ secrets.ZOOM_CHATBOT_CLIENT_SECRET }}
                    ZOOM_USER_EMAIL: ${{ secrets.ZOOM_USER_EMAIL }}
        run: python scripts/check_releases.py

      - name: Commit and push changes
        run: |
          git config user.name "Release Notes Bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ docs/feeds/ docs/slack_channels.json docs/zoom_channels.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update release notes feeds [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git pull --rebase origin main
            git push
          fi
